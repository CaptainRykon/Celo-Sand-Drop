<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Unity Web Player | Sanddrop</title>

    <link rel="shortcut icon" href="TemplateData/favicon.ico" />
    <link rel="stylesheet" href="TemplateData/style.css" />
    <link rel="manifest" href="manifest.webmanifest" />

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #fff;
            overflow: hidden;
        }

        #unity-canvas {
            display: block;
            background: #fff;
        }

        /* Overlay */
        .overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fff;
        }

        .game-logo {
            width: 140px;
        }

        /* 🔥 Loading Container */
        #loading-container {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            max-width: 320px;
            z-index: 10000;
            text-align: center;
        }

        /* 🔥 Progress Bar */
        #progress-bar-bg {
            width: 100%;
            height: 6px;
            background: rgba(0,0,0,0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        #progress-bar-fill {
            width: 0%;
            height: 100%;
            background: #000;
            transition: width 0.25s ease;
        }

        /* 🔥 Loading Text */
        #loading-text {
            margin-top: 8px;
            font-size: 13px;
            color: #555;
        }

        #unity-warning {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 10001;
        }
    </style>
</head>

<body>

    <div id="unity-container">
        <canvas id="unity-canvas"></canvas>

        <!-- Overlay -->
        <div class="overlay" id="overlay">
            <img class="game-logo" src="https://i.ibb.co/PnCb0BL/Untitled-design-2026-04-01-T150002-078.png" />
        </div>

        <!-- 🔥 Loading UI -->
        <div id="loading-container">
            <div id="progress-bar-bg">
                <div id="progress-bar-fill"></div>
            </div>
            <div id="loading-text">Loading game... 0%</div>
        </div>

        <div id="unity-warning"></div>
    </div>

    <script>
        // ❌ DISABLED (fixes wasm issues)
        // if ("serviceWorker" in navigator) {
        //     navigator.serviceWorker.register("ServiceWorker.js");
        // }

        const canvas = document.querySelector("#unity-canvas");
        const progressBar = document.querySelector("#progress-bar-fill");
        const loadingText = document.querySelector("#loading-text");
        const overlay = document.querySelector("#overlay");
        const loadingContainer = document.querySelector("#loading-container");

        function unityShowBanner(msg, type) {
            const warningBanner = document.querySelector("#unity-warning");
            const div = document.createElement("div");
            div.innerHTML = msg;
            warningBanner.appendChild(div);

            if (type === "error") div.style = "background:red;padding:10px;";
            else div.style = "background:yellow;padding:10px;";

            setTimeout(() => {
                warningBanner.removeChild(div);
            }, 5000);
        }

        var buildUrl = "Build";
        var loaderUrl = buildUrl + "/85b74916a9e60850f1e81997d93b62ff.loader.js";
        var config = {
            arguments: [],
            dataUrl: buildUrl + "/6557e268b0432819472c08e6d2dc004f.data.br",
            frameworkUrl: buildUrl + "/aae0786fd8f24e475f83a0221a123f3d.framework.js.br",
            codeUrl: buildUrl + "/cb19f8d2a816eb3aeffb9905799618ee.wasm.br",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "DefaultCompany",
            productName: "MiniPay SandDrop",
            productVersion: "1.0",
            showBanner: unityShowBanner,
        };

        // Mobile viewport fix
        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
            const meta = document.createElement("meta");
            meta.name = "viewport";
            meta.content = "width=device-width, height=device-height, initial-scale=1.0, user-scalable=no";
            document.head.appendChild(meta);
        }

        // Load Unity
        var script = document.createElement("script");
        script.src = loaderUrl;

        script.onload = () => {
            createUnityInstance(canvas, config, (progress) => {

                const percent = Math.floor(progress * 100);

                // 🔥 Update bar
                progressBar.style.width = percent + "%";

                // 🔥 Update text
                loadingText.innerText = "Loading game... " + percent + "%";

            }).then((unityInstance) => {

                window.unityInstance = unityInstance;

                function fixCanvasSize() {
                    canvas.style.width = window.innerWidth + "px";
                    canvas.style.height = window.innerHeight + "px";
                }

                fixCanvasSize();
                window.addEventListener("resize", fixCanvasSize);

                // ✅ Hide loading UI
                overlay.style.display = "none";
                loadingContainer.style.display = "none";

                // Unity message bridge
                window.addEventListener("message", function (event) {

                    if (!event.data) return;

                    if (event.data.type === "UNITY_CALLBACK") {

                        let target = "Leaderboard";

                        if (
                            event.data.method === "OnUserData" ||
                            event.data.method === "OnChanceUsed" ||
                            event.data.method === "OnChancesPurchased" ||
                            event.data.method === "OnPurchaseSuccess" ||
                            event.data.method === "OnPurchaseFailed"
                        ) {
                            target = "Chance";
                        }

                        unityInstance.SendMessage(
                            target,
                            event.data.method,
                            event.data.value
                        );
                    }
                });

            }).catch(err => {
                alert("Failed to load game. Please refresh.");
                console.error(err);
            });
        };

        document.body.appendChild(script);
    </script>

</body>
</html>
