

<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Unity Web Player | Sanddrop</title>

    <link rel="shortcut icon" href="TemplateData/favicon.ico" />
    <link rel="stylesheet" href="TemplateData/style.css" />
    <link rel="manifest" href="manifest.webmanifest" />

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #fff;
            overflow: hidden;
        }

        .overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #fff;
        }

        .game-logo {
            width: 140px;
            height: auto;
            margin-bottom: 10px;
        }

        #unity-canvas {
            display: block;
            background: #fff;
        }

        #unity-loading-bar {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            max-width: 300px;
            z-index: 10000;
        }

        #unity-progress-bar-empty {
            width: 100%;
            height: 6px;
            background: rgba(0,0,0,0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        #unity-progress-bar-full {
            width: 0%;
            height: 100%;
            background: #000;
            transition: width 0.2s ease;
        }

        #loading-text {
            text-align: center;
            font-size: 12px;
            color: #555;
            margin-top: 6px;
        }


    </style>
</head>

<body>
    <div id="unity-container">
        <canvas id="unity-canvas" width="432" height="900" tabindex="-1"></canvas>

        <!-- Overlay -->
        <div class="overlay">
            <img class="game-logo" src="https://i.ibb.co/PnCb0BL/Untitled-design-2026-04-01-T150002-078.png" />
        </div>

        <!-- Loading Bar -->
        <div id="unity-loading-bar">
            <div id="unity-progress-bar-empty">
                <div id="unity-progress-bar-full"></div>
            </div>
            <div id="loading-text">Loading game...</div>
        </div>

        <div id="unity-warning"></div>
    </div>

    <script>
        // ================= Service Worker =================
        window.addEventListener("load", function () {
            if ("serviceWorker" in navigator) {
                navigator.serviceWorker.register("ServiceWorker.js");
            }
        });

        const canvas = document.querySelector("#unity-canvas");
        const loadingBar = document.querySelector("#unity-loading-bar");
        const progressBarFull = document.querySelector("#unity-progress-bar-full");
        const warningBanner = document.querySelector("#unity-warning");

        function unityShowBanner(msg, type) {
            function updateBannerVisibility() {
                warningBanner.style.display = warningBanner.children.length ? "block" : "none";
            }
            const div = document.createElement("div");
            div.innerHTML = msg;
            warningBanner.appendChild(div);
            if (type === "error") div.style = "background:red;padding:10px;";
            else {
                if (type === "warning") div.style = "background:yellow;padding:10px;";
                setTimeout(() => {
                    warningBanner.removeChild(div);
                    updateBannerVisibility();
                }, 5000);
            }
            updateBannerVisibility();
        }

        // ================= Build Config =================


        var buildUrl = "Build";
        var loaderUrl = buildUrl + "/b7a3f0884b48b8cb436a7e6476a18791.loader.js";
        var config = {
            arguments: [],
            dataUrl: buildUrl + "/4221a8bdda350bd8a4918402c7c181bb.data",
            frameworkUrl: buildUrl + "/aae0786fd8f24e475f83a0221a123f3d.framework.js",
            codeUrl: buildUrl + "/6b868e9332783f270f9ee4971484033b.wasm",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "DefaultCompany",
            productName: "MiniPay SandDrop",
            productVersion: "1.0",
            showBanner: unityShowBanner,

        };

        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
            const meta = document.createElement("meta");
            meta.name = "viewport";
            meta.content =
                "width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes";
            document.head.appendChild(meta);
        }

        loadingBar.style.display = "block";

        // ================= Canvas Resize Fix =================

     

        // ================= Load Unity =================
        var script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = () => {
            createUnityInstance(canvas, config, (progress) => {
                progressBarFull.style.width = (100 * progress) + "%";
            }).then((unityInstance) => {
                window.unityInstance = unityInstance;

                function fixCanvasSize() {
                    const width = window.innerWidth;
                    const height = window.innerHeight;

                    canvas.style.width = width + "px";
                    canvas.style.height = height + "px";
                }

                fixCanvasSize();
                window.addEventListener("resize", fixCanvasSize);

                loadingBar.style.display = "none";
                document.querySelector(".overlay").style.display = "none";


                window.addEventListener("message", function (event) {

                    if (!event.data) return;

                    if (event.data.type === "UNITY_CALLBACK") {

                        const method = event.data.method;

                        // 🎯 ROUTING LOGIC
                        let target = "Leaderboard"; // default

                        if (
                            method === "OnUserData" ||
                            method === "OnChanceUsed" ||
                            method === "OnChancesPurchased" ||
                            method === "OnPurchaseSuccess" ||
                            method === "OnPurchaseFailed"

                        ) {
                            target = "Chance";
                        }

                        unityInstance.SendMessage(
                            target,
                            method,
                            event.data.value
                        );
                    }

                });


                // === React → Unity Listener ===
               

            }).catch(err => alert(err));
        };

        document.body.appendChild(script);
    </script>
</body>
</html>
