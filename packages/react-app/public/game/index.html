<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Unity Web Player | Clank Sort</title>

    <link rel="shortcut icon" href="TemplateData/favicon.ico" />
    <link rel="stylesheet" href="TemplateData/style.css" />
    <link rel="manifest" href="manifest.webmanifest" />

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #fff;
            overflow: hidden;
        }

        .overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #fff;
        }

        .game-logo {
            width: 140px;
            height: auto;
            margin-bottom: 10px;
        }

        #unity-canvas {
            display: block;
            background: #fff;
        }
    </style>
</head>

<body>
    <div id="unity-container">
        <canvas id="unity-canvas" width="432" height="900" tabindex="-1"></canvas>

        <!-- Overlay -->
        <div class="overlay">
            <img class="game-logo" src="https://i.ibb.co/1Gm50dQy/icon.png" />
        </div>

        <!-- Loading Bar -->
        <div id="unity-loading-bar">
            <div id="unity-progress-bar-empty">
                <div id="unity-progress-bar-full"></div>
            </div>
        </div>

        <div id="unity-warning"></div>
    </div>

    <script>
        // ================= Service Worker =================
        window.addEventListener("load", function () {
            if ("serviceWorker" in navigator) {
                navigator.serviceWorker.register("ServiceWorker.js");
            }
        });

        const canvas = document.querySelector("#unity-canvas");
        const loadingBar = document.querySelector("#unity-loading-bar");
        const progressBarFull = document.querySelector("#unity-progress-bar-full");
        const warningBanner = document.querySelector("#unity-warning");

        function unityShowBanner(msg, type) {
            function updateBannerVisibility() {
                warningBanner.style.display = warningBanner.children.length ? "block" : "none";
            }
            const div = document.createElement("div");
            div.innerHTML = msg;
            warningBanner.appendChild(div);
            if (type === "error") div.style = "background:red;padding:10px;";
            else {
                if (type === "warning") div.style = "background:yellow;padding:10px;";
                setTimeout(() => {
                    warningBanner.removeChild(div);
                    updateBannerVisibility();
                }, 5000);
            }
            updateBannerVisibility();
        }


        var buildUrl = "Build";
        var loaderUrl = buildUrl + "/9e0d142adb350bc74dee06c78832eca3.loader.js";
        var config = {
            arguments: [],
            dataUrl: buildUrl + "/6f802d225452b6f8b44fdcb19ac79fc6.data",
            frameworkUrl: buildUrl + "/7055aa7c4b198754fbfb1c12b1e03ccc.framework.js",
            codeUrl: buildUrl + "/e591d8de811cf6a1bbdcd7b3ec269563.wasm",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "Rykon Studios",
            productName: "Sand Bricks",
            productVersion: "1.0",
            showBanner: unityShowBanner,
        };

        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
            const meta = document.createElement("meta");
            meta.name = "viewport";
            meta.content =
                "width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes";
            document.head.appendChild(meta);
        }

        loadingBar.style.display = "block";

        // ================= Canvas Resize Fix =================
        function ResizeCanvasWithAspect() {
            const container = canvas.parentElement;
            const cw = container.clientWidth;
            const ch = container.clientHeight;

            const containerAspect = cw / ch;
            const gameAspect = 432 / 900;

            let width, height;

            if (containerAspect > gameAspect) {
                // Container too wide → fit height
                height = ch;
                width = height * gameAspect;
            } else {
                // Container too tall → fit width
                width = cw;
                height = width / gameAspect;
            }

            canvas.style.width = width + "px";
            canvas.style.height = height + "px";
            canvas.style.margin = "auto";
            canvas.style.display = "block";
        }

        window.addEventListener("resize", ResizeCanvasWithAspect);

        // ================= Load Unity =================
        var script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = () => {
            createUnityInstance(canvas, config, (progress) => {
                progressBarFull.style.width = (100 * progress) + "%";
            }).then((unityInstance) => {
                window.unityInstance = unityInstance;
                loadingBar.style.display = "none";
                document.querySelector(".overlay").style.display = "none";



                // === FIX: Apply canvas size correction NOW ===
                ResizeCanvasWithAspect();

                // =================================================

                // === Farcaster Bridge & Coins ===
                window.UnityShareGame = () => window.parent.postMessage({ type: "frame-action", action: "share-game" }, "*");
                window.UnityShareScore = (s) => window.parent.postMessage({ type: "frame-action", action: "share-score", message: s }, "*");
                window.RequestFarcasterUserData = () => {
                    console.log("📨 Unity requested Farcaster user context");
                    window.parent.postMessage({ type: "frame-action", action: "get-user-context" }, "*");
                };

                // === Spin System Integration ===
                window.SaveSpinData = (dailyChancesLeft, lastResetTime) => {
                    console.log("💾 [index.html] Forwarding SaveSpinData → React", { dailyChancesLeft, lastResetTime });
                    window.parent.postMessage({
                        type: "frame-action",
                        action: "save-spin-data",
                        data: { dailyChancesLeft, lastResetTime }
                    }, "*");
                };

                window.RequestSpinData = () => {
                    console.log("📨 [index.html] Forwarding RequestSpinData → React");
                    window.parent.postMessage({
                        type: "frame-action",
                        action: "get-spin-data"
                    }, "*");
                };

                // === Daily Reward System Integration ===
                window.RequestDailyRewardData = () => {
                    console.log("📨 [index.html] Forwarding RequestDailyRewardData → React");
                    window.parent.postMessage({
                        type: "frame-action",
                        action: "get-daily-reward-data"
                    }, "*");
                };

                window.SaveDailyRewardClaim = () => {
                    console.log("💾 [index.html] Forwarding SaveDailyRewardClaim → React");
                    window.parent.postMessage({
                        type: "frame-action",
                        action: "save-daily-reward-claim"
                    }, "*");
                };

                // === 🏆 Shop Pass System Integration ===
                window.RequestShopPassData = () => {
                    console.log("📨 [index.html] Forwarding RequestShopPassData → React");
                    window.parent.postMessage({
                        type: "frame-action",
                        action: "get-shop-pass-data"
                    }, "*");
                };

                window.SaveShopPassData = (passType, expiry) => {
                    console.log("💾 [index.html] Forwarding SaveShopPassData → React", { passType, expiry });
                    window.parent.postMessage({
                        type: "frame-action",
                        action: "save-shop-pass-data",
                        data: { passType, expiry }
                    }, "*");
                };

                window.RequestPoints = () => {
                    window.parent.postMessage(
                        { type: "frame-action", action: "get-points" },
                        "*"
                    );
                };

                window.SavePoints = (points) => {
                    window.parent.postMessage(
                        { type: "frame-action", action: "save-points", amount: points },
                        "*"
                    );
                };



                window.addEventListener("message", (ev) => {
                    const d = ev.data;

                    if (d?.type === "frame-action" && d.action === "request-payment") {
                        console.log("💳 Forwarding legacy payment request");

                        window.parent.postMessage(
                            {
                                type: "frame-action",
                                action: "request-pass-payment",
                                amount: d.amount,
                                passType: "mint",
                                chain: d.chain
                            }, "*");
                    }
                });



                // Add chain parameter ↓↓↓
                window.RequestPassPayment = (amount, passType, chain) => {
                    console.log(`💳 [index.html] Requesting pass payment → ${amount} USDC for ${passType} on ${chain}`);

                    window.parent.postMessage({
                        type: "frame-action",
                        action: "request-pass-payment",
                        amount: Number(amount),
                        passType: passType,
                        chain: chain   // send chain to React
                    }, "*");
                };


                // === React → Unity Listener ===
                window.addEventListener("message", (ev) => {
                    const d = ev.data;

                    // Farcaster user info
                    if (d?.type === "FARCASTER_USER_INFO") {
                        const { username, pfpUrl } = d.payload || {};
                        if (username) unityInstance.SendMessage("FarcasterBridge", "SetFarcasterUsername", username);
                        if (pfpUrl) unityInstance.SendMessage("FarcasterBridge", "SetPfpUrl", pfpUrl);
                    }

                    // Unity method calls (from React)
                    if (d?.type === "UNITY_METHOD_CALL") {
                        const method = d.method;
                        const arg = d.args?.[0] || "0";

                        // Send SetSpinData to SpinManager instead of FarcasterBridge
                        let targetObject = "FarcasterBridge";

                        if (method === "SetSpinData") targetObject = "SpinManager";
                        if (method === "SetLeaderboardEntries") targetObject = "Leaderboard";

                        unityInstance.SendMessage(targetObject, method, arg);

                    }

                    // 🏆 Shop Pass data from React → Unity
                    if (d?.type === "UNITY_METHOD_CALL" && d.method === "SetPassData") {
                        const arg = d.args?.[0] || "";
                        console.log("🎟️ [index.html] Received pass data from React → sending to Unity:", arg);
                        unityInstance.SendMessage("PassManager", "SetPassData", arg);
                    }

                    // Daily reward data from React → Unity
                    if (d?.type === "UNITY_METHOD_CALL" && d.method === "SetDailyRewardData") {
                        const arg = d.args?.[0] || "";
                        unityInstance.SendMessage("FarcasterBridge", "SetDailyRewardData", arg);
                    }


                    // Follow Quest Status (already claimed or completed)
                    if (d?.type === "UNITY_METHOD_CALL" && d.method === "OnFollowQuestStatus") {
                        const arg = d.args?.[0] || "";
                        console.log("📩 [index.html] Sending FollowQuestStatus → Unity:", arg);
                        unityInstance.SendMessage("FarcasterBridge", "OnFollowQuestStatus", arg);
                    }



                    if (d?.type === "UNITY_METHOD_CALL" && d.method === "SetPoints") {
                        unityInstance.SendMessage("PointsManager", "SetPoints", d.args[0]);
                    }




                    // ✅ Payment success callback from React → Unity
                    if (d?.type === "UNITY_METHOD_CALL" && d.method === "OnPaymentSuccess") {
                        const passType = d.args?.[0] || "UNKNOWN_PASS";
                        console.log(`✅ [index.html] Payment success for ${passType}`);
                        unityInstance.SendMessage("PassManager", "OnPaymentSuccess", passType);
                    }
                });

            }).catch(err => alert(err));
        };

        document.body.appendChild(script);
    </script>
</body>
</html>
