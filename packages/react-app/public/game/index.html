<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Unity Web Player | Clank Sort</title>

    <link rel="shortcut icon" href="TemplateData/favicon.ico" />
    <link rel="stylesheet" href="TemplateData/style.css" />
    <link rel="manifest" href="manifest.webmanifest" />

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #fff;
            overflow: hidden;
        }

        .overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #fff;
        }

        .game-logo {
            width: 140px;
            height: auto;
            margin-bottom: 10px;
        }

        #unity-canvas {
            display: block;
            background: #fff;
        }
    </style>
</head>

<body>
    <div id="unity-container">
        <canvas id="unity-canvas" width="432" height="900" tabindex="-1"></canvas>

        <!-- Overlay -->
        <div class="overlay">
            <img class="game-logo" src="https://i.ibb.co/1Gm50dQy/icon.png" />
        </div>

        <!-- Loading Bar -->
        <div id="unity-loading-bar">
            <div id="unity-progress-bar-empty">
                <div id="unity-progress-bar-full"></div>
            </div>
        </div>

        <div id="unity-warning"></div>
    </div>

    <script>
        // ================= Service Worker =================
        window.addEventListener("load", function () {
            if ("serviceWorker" in navigator) {
                navigator.serviceWorker.register("ServiceWorker.js");
            }
        });

        const canvas = document.querySelector("#unity-canvas");
        const loadingBar = document.querySelector("#unity-loading-bar");
        const progressBarFull = document.querySelector("#unity-progress-bar-full");
        const warningBanner = document.querySelector("#unity-warning");

        function unityShowBanner(msg, type) {
            function updateBannerVisibility() {
                warningBanner.style.display = warningBanner.children.length ? "block" : "none";
            }
            const div = document.createElement("div");
            div.innerHTML = msg;
            warningBanner.appendChild(div);
            if (type === "error") div.style = "background:red;padding:10px;";
            else {
                if (type === "warning") div.style = "background:yellow;padding:10px;";
                setTimeout(() => {
                    warningBanner.removeChild(div);
                    updateBannerVisibility();
                }, 5000);
            }
            updateBannerVisibility();
        }



        var buildUrl = "Build";
        var loaderUrl = buildUrl + "/00de09ab7d445944cec2347d2112684d.loader.js";
        var config = {
            arguments: [],
            dataUrl: buildUrl + "/4cb344d95764b2bd914a3981363bef63.data",
            frameworkUrl: buildUrl + "/9fafacf9aa1b228807ff824072e0ce3b.framework.js",
            codeUrl: buildUrl + "/a965ef9d1b641a38b6ec0cc2d7894f24.wasm",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "DefaultCompany",
            productName: "MiniPay SandDrop",
            productVersion: "1.0",
            showBanner: unityShowBanner,
        };

        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
            const meta = document.createElement("meta");
            meta.name = "viewport";
            meta.content =
                "width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes";
            document.head.appendChild(meta);
        }

        loadingBar.style.display = "block";

        // ================= Canvas Resize Fix =================
        function ResizeCanvasWithAspect() {
            const container = canvas.parentElement;
            const cw = container.clientWidth;
            const ch = container.clientHeight;

            const containerAspect = cw / ch;
            const gameAspect = 432 / 900;

            let width, height;

            if (containerAspect > gameAspect) {
                // Container too wide → fit height
                height = ch;
                width = height * gameAspect;
            } else {
                // Container too tall → fit width
                width = cw;
                height = width / gameAspect;
            }

            canvas.style.width = width + "px";
            canvas.style.height = height + "px";
            canvas.style.margin = "auto";
            canvas.style.display = "block";
        }

        window.addEventListener("resize", ResizeCanvasWithAspect);

        // ================= Load Unity =================
        var script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = () => {
            createUnityInstance(canvas, config, (progress) => {
                progressBarFull.style.width = (100 * progress) + "%";
            }).then((unityInstance) => {
                window.unityInstance = unityInstance;
                loadingBar.style.display = "none";
                document.querySelector(".overlay").style.display = "none";



                // === FIX: Apply canvas size correction NOW ===
                ResizeCanvasWithAspect();






                window.addEventListener("message", function (event) {

                    if (!event.data) return;

                    if (event.data.type === "UNITY_CALLBACK") {

                        unityInstance.SendMessage(
                            "Leaderboard", // GameObject name
                            event.data.method,
                            event.data.value
                        );
                    }

                });


                // === React → Unity Listener ===
               

            }).catch(err => alert(err));
        };

        document.body.appendChild(script);
    </script>
</body>
</html>
